{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Book Details</title>

  <link rel="icon" type="image/svg+xml" href="{% static 'images/dribbble.svg' %}">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="{% static 'css/Book_Details.css' %}">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="F-header">

      <h1>
        <a href="{% url 'home' %}" style="text-decoration:none; color:inherit;">
          <i class="bi bi-dribbble"></i> FOLIO.
        </a>
      </h1>

      <ul class="nav-links">
        <li><a href="{% url 'home' %}"><i class="bi bi-house"></i> Home</a></li>
        <li><a href="{% url 'books' %}" class="active"><i class="bi bi-grid"></i> Books</a></li>
        <li><a href="{% url 'about' %}"><i class="bi bi-info-circle"></i> About</a></li>
        <li><a href="{% url 'contact' %}"><i class="bi bi-envelope"></i> Contact</a></li>
      </ul>

    </div>

    <div class="L-header">

      <form>
        <input id="search" type="search" placeholder="Search books, authors…">
      </form>

      <a href="{% url 'my_list' %}" class="icon-btn" title="My List">
        <i class="bi bi-bookmark"></i>
      </a>

      <a href="{% url 'cart' %}" class="icon-btn" title="Cart" style="position:relative">
        <i class="bi bi-bag"></i>
        <span class="cart-badge" id="cart-badge">0</span>
      </a>

      <a href="{% url 'user_profile' %}" class="icon-btn" title="Profile">
        <i class="fa-regular fa-circle-user"></i>
      </a>

    </div>
  </header>

  <!-- MAIN -->
  <main class="page-wrap">

    <a href="{% url 'books' %}" class="back-btn" id="back-btn">
      <i class="bi bi-arrow-left"></i> Back to Books
    </a>

    <div id="book-detail-root"></div>

  </main>

  {% if book_json %}
  <script>
    window.SERVER_BOOK = {{ book_json|safe }};
  </script>
  {% endif %}

  <!-- JS (IMPORTANT FIX: defer ensures DOM is ready) -->
  <script defer src="{% static 'js/Book_Details.js' %}"></script>

  <div id="toast-container"></div>

</body>

</html>
