<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart</title>

    <link rel="icon" type="image/icon" href="../../Pictures/dribbble.svg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <script src="../JavaScript-file/Cart.js"></script>
  <style></style>
  <link rel="stylesheet" href="../Css-file/Cart.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">



</head>
<body>
<header class="header">

    <div class="F-header">

        <h1><i class="bi bi-dribbble"></i>FOLIO.</h1>
        <ul>
            <li><a  href="index.html"><i class="bi bi-house"></i>Home</a></li>
            <li><a href="Books.html"><i class="bi bi-grid"></i>books</a></li>
            <li><a href="About.html"><i class="bi bi-info-circle"></i>About</a></li>
            <li><a href="Contact.html"><i class="bi bi-envelope"></i>Contact</a></li>
        </ul>

    </div>

    <div class="L-header">
      <form>
        <input id="search" type="search" placeholder="Search books,authors...">
        <label for="search" style="color:#ffd636; padding:3px 3px 3px 3px ; border: solid 1px #ffd636; border-radius: 5px  " ><i class="bi bi-search"></i></label>

      </form>
      <button><a href="my_list.html"><i class="fa-regular fa-bookmark"></i></a></button>
      <button><a href="Cart.html"><i class="bi bi-bag"></i></a></button>
      <button><a href="User_profile.html"><i class="fa-regular fa-circle-user"></i></a></button>



    </div>
</header>



  <!-- TOP HEADER -->
  <div class="top-header">
    <div class="bag-label">
      <span class="eyebrow-line"></span>
      <span>YOUR BAG</span>
    </div>
    <h1 class="main-title">Shopping <em>Cart</em></h1>
    <div class="checkout-steps">
      <div class="step active">
        <div class="circle">1</div><span>CART</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="circle">2</div><span>SHIPPING</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="circle">3</div><span>PAYMENT</span>
      </div>
      <div class="step-line"></div>
      <div class="step">
        <div class="circle">4</div><span>CONFIRM</span>
      </div>
    </div>
  </div>
  
  <!-- MAIN CONTAINER -->
  <div class="container">
    <!-- Cart Items -->
    <div class="cart">
      <div id="cart-items-list"></div>
      <div class="cart-actions">
        <a href="#" class="btn-ghost"><i class="bi bi-arrow-left"></i> Continue Shopping</a>
        <button class="btn-ghost danger" onclick="clearCart()"><i class="bi bi-trash"></i> Clear Cart</button>
      </div>
    </div>
  
    <!-- Order Summary -->
    <div class="summary">
      <h2>Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal-val">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span class="free">Free</span></div>
      <div class="summary-row"><span>Discount</span><span class="discount" id="discount-val">−$0.00</span></div>
      <hr class="divider" />
      <div class="summary-row total">
        <span>Total</span>
        <span class="total-val" id="total-val">$0.00</span>
      </div>
      <button class="checkout-btn" onclick="showToast('🚚 Proceeding to checkout!')">
        <i class="bi bi-lock"></i> Checkout Securely
      </button>
      <div class="trust-badges">
        <span><i class="bi bi-shield-check"></i> SSL Secure</span>
        <span><i class="bi bi-arrow-counterclockwise"></i> Free Returns</span>
      </div>
      <hr class="divider" />
      <div class="promo">
        <input type="text" placeholder="Promo code" class="promo-input" id="promo-input" />
        <button class="promo-btn" onclick="applyPromo()">Apply</button>
      </div>
    </div>
  </div>
  
  <!-- TOAST CONTAINER -->
  <div id="toast-container"></div>


</body>
</html>
